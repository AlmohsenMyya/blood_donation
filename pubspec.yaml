name: sheryan
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # 🔥 Firebase (BoM 4.12 - متوافق رسمي)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  firebase_storage: ^13.3.0

  # 📍 Location
  geolocator: ^14.0.2

  # 🔔 Notifications
  flutter_local_notifications: ^21.0.0

  # 🧠 State Management
  flutter_riverpod: ^3.0.3

  # 🧰 Utils
  intl: ^0.20.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

  # 📷 Scanner (مستقر بدون كسر المشروع)
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  onesignal_flutter: ^5.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true